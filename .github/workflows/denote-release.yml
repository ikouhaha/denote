name: Denote Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release-tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Apply tag version to package metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tag must look like v0.1.6. Got: $env:RELEASE_TAG"
          }
          npm version $Matches.version --no-git-tag-version

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          $notes = @"
          Denote $env:RELEASE_TAG

          This release contains the current Windows installer build.

          Note: this is an early desktop shell while the Denote MVP features are being implemented.
          "@

          gh release view $env:RELEASE_TAG --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:RELEASE_TAG `
              --repo "${{ github.repository }}" `
              --title "Denote $env:RELEASE_TAG" `
              --notes "$notes" `
              --draft=false `
              --prerelease=false
          } else {
            gh release create $env:RELEASE_TAG `
              --repo "${{ github.repository }}" `
              --title "Denote $env:RELEASE_TAG" `
              --notes "$notes" `
              --verify-tag
          }

      - name: Build and publish Windows executable
        run: npx electron-builder --win nsis:x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify updater metadata was published
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          gh release view $env:RELEASE_TAG `
            --repo "${{ github.repository }}" `
            --json assets `
            --jq '.assets[].name' | Tee-Object -Variable assets

          if ($assets -notcontains "latest.yml") {
            throw "latest.yml was not published for $env:RELEASE_TAG"
          }
