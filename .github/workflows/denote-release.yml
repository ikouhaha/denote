name: Denote Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Tauri artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release-tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Apply tag version to package metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: node scripts/apply-release-version.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit

      - name: Build Windows Tauri app
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: denote-windows-${{ steps.release-tag.outputs.tag }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply tag version to package metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: node scripts/apply-release-version.mjs

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: npm run build:android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: denote-android-${{ steps.release-tag.outputs.tag }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo "${{ github.repository }}" --title "Denote $RELEASE_TAG" --notes "Denote $RELEASE_TAG"
          find release-artifacts -type f -print0 | xargs -0 gh release upload "$RELEASE_TAG" --repo "${{ github.repository }}" --clobber

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          notes=$(cat <<EOF
          Denote $RELEASE_TAG

          This release contains the current Tauri Windows installer build and Android APK artifact.

          Note: Tauri updater metadata is not configured in this release yet.
          EOF
          )

          gh release edit "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --title "Denote $RELEASE_TAG" \
            --notes "$notes" \
            --draft=false \
            --prerelease=false
