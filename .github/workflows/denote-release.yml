name: Denote Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Tauri artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-denote-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-denote-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release-tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Apply tag version to package metadata
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: node scripts/apply-release-version.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --omit=dev

      - name: Build Windows Tauri app
        run: npm run build:win

      - name: Sign Windows artifacts
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64 -and -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            Write-Warning "Windows signing secrets are not configured. Uploading unsigned Windows artifacts."
            return
          }

          if (-not $env:WINDOWS_CERTIFICATE_BASE64 -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Both WINDOWS_CERTIFICATE_BASE64 and WINDOWS_CERTIFICATE_PASSWORD must be configured for Windows signing."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "denote-windows-signing.pfx"
          [System.IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))

          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          $publicCertificatePath = Join-Path $env:RUNNER_TEMP "denote-windows-signing.cer"
          Export-Certificate -Cert $certificate -FilePath $publicCertificatePath | Out-Null
          Import-Certificate -FilePath $publicCertificatePath -CertStoreLocation Cert:\CurrentUser\Root | Out-Null
          Import-Certificate -FilePath $publicCertificatePath -CertStoreLocation Cert:\CurrentUser\TrustedPublisher | Out-Null

          $artifacts = @()
          $artifacts += Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue
          $artifacts += Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue

          if ($artifacts.Count -eq 0) {
            throw "No Windows artifacts found to sign."
          }

          foreach ($artifact in $artifacts) {
            $signature = Set-AuthenticodeSignature `
              -FilePath $artifact.FullName `
              -Certificate $certificate `
              -TimestampServer "http://timestamp.digicert.com" `
              -HashAlgorithm SHA256

            if ($signature.Status -ne "Valid") {
              throw "Signing failed for $($artifact.FullName): $($signature.Status)"
            }
          }

          Get-AuthenticodeSignature $artifacts.FullName | Format-Table Path, Status, SignerCertificate -AutoSize

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: denote-windows-${{ steps.release-tag.outputs.tag }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-denote-android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-denote-android-cargo-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle build
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src-tauri/gen/android/.gradle
            src-tauri/gen/android/app/build
          key: ${{ runner.os }}-denote-gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-denote-gradle-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply tag version to package metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: node scripts/apply-release-version.mjs

      - name: Set up Android signing
        shell: bash
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          cd src-tauri/gen/android
          if [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ] && [ -n "$ANDROID_KEY_BASE64" ]; then
            echo "$ANDROID_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/denote-release.jks"
            key_alias="$ANDROID_KEY_ALIAS"
            key_password="$ANDROID_KEY_PASSWORD"
            key_store="$RUNNER_TEMP/denote-release.jks"
          else
            key_alias="denote-ci-sideload"
            key_password="denote-ci-sideload-password"
            key_store="$RUNNER_TEMP/denote-ci-sideload.jks"
            keytool -genkeypair -v \
              -keystore "$key_store" \
              -storepass "$key_password" \
              -keypass "$key_password" \
              -alias "$key_alias" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Denote CI,O=Denote,C=HK"
          fi
          {
            echo "keyAlias=$key_alias"
            echo "password=$key_password"
            echo "storeFile=$key_store"
          } > keystore.properties

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: npm run build:android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: denote-android-${{ steps.release-tag.outputs.tag }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*release*.apk
            !src-tauri/gen/android/app/build/outputs/apk/**/*unsigned*.apk
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo "${{ github.repository }}" --title "Denote $RELEASE_TAG" --notes "Denote $RELEASE_TAG"
          find release-artifacts -type f -print0 | xargs -0 gh release upload "$RELEASE_TAG" --repo "${{ github.repository }}" --clobber

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          notes=$(cat <<EOF
          Denote $RELEASE_TAG

          This release contains the current Tauri Windows installer build and signed Android APK artifact.

          Update checks open the latest GitHub Release. Silent Tauri updater installation is not enabled until signing keys are configured.
          EOF
          )

          gh release edit "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --title "Denote $RELEASE_TAG" \
            --notes "$notes" \
            --draft=false \
            --prerelease=false
